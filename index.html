<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>등가속도 직선운동 연습</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252836;
      --border: #2e3347;
      --accent: #4f8ef7;
      --accent2: #f7c94f;
      --accent3: #4ff7a0;
      --danger: #f7614f;
      --text: #e8eaf2;
      --text-sub: #8b8fa8;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── 헤더 ── */
    header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1.1em;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    header h1 span { color: var(--accent); }

    .score-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9em;
    }
    .score-badge b { color: var(--accent2); }

    /* ── 레벨 선택 화면 ── */
    #level-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      gap: 24px;
      width: 100%;
      max-width: 700px;
    }
    #level-screen h2 { font-size: 1.3em; color: var(--text-sub); font-weight: 400; }

    .level-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      width: 100%;
    }
    .level-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 20px;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
      text-align: center;
    }
    .level-card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .level-card.lv1:hover { border-color: var(--accent3); }
    .level-card.lv2:hover { border-color: var(--accent2); }
    .level-card.lv3:hover { border-color: var(--danger); }
    .level-card .lv-num { font-size: 2em; font-weight: 700; margin-bottom: 8px; }
    .lv1 .lv-num { color: var(--accent3); }
    .lv2 .lv-num { color: var(--accent2); }
    .lv3 .lv-num { color: var(--danger); }
    .level-card .lv-title { font-size: 0.95em; font-weight: 600; margin-bottom: 6px; }
    .level-card .lv-desc { font-size: 0.78em; color: var(--text-sub); line-height: 1.5; }

    /* ── 문제 화면 ── */
    #problem-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 48px;
      gap: 20px;
      width: 100%;
      max-width: 780px;
    }

    .problem-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .level-tag {
      font-size: 0.8em;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
    }
    .lv1-tag { background: rgba(79,247,160,.12); color: var(--accent3); border: 1px solid var(--accent3); }
    .lv2-tag { background: rgba(247,201,79,.12); color: var(--accent2); border: 1px solid var(--accent2); }
    .lv3-tag { background: rgba(247,97,79,.12); color: var(--danger); border: 1px solid var(--danger); }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-sub);
      padding: 5px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82em;
      font-family: inherit;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 문제 카드 ── */
    .problem-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
    }
    .problem-type-label {
      font-size: 0.75em;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .problem-text {
      font-size: 1em;
      line-height: 1.7;
      color: var(--text);
    }

    /* ── 캔버스 ── */
    canvas {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: block;
      max-width: 100%;
    }

    /* ── 선택지 (레벨1용 그래프 스케치) ── */
    .choices-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      width: 100%;
    }
    .choice-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      cursor: pointer;
      transition: border-color .2s;
    }
    .choice-btn:hover { border-color: var(--accent); }
    .choice-btn.selected { border-color: var(--accent); background: rgba(79,142,247,.08); }
    .choice-btn.correct { border-color: var(--accent3); background: rgba(79,247,160,.08); }
    .choice-btn.wrong { border-color: var(--danger); background: rgba(247,97,79,.08); }
    .choice-btn canvas { pointer-events: none; }

    /* ── 입력 폼 ── */
    .input-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      width: 100%;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-group label {
      font-size: 0.82em;
      color: var(--text-sub);
    }
    .input-group input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1em;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
    }
    .input-group input:focus { border-color: var(--accent); }
    .input-group input.correct-input { border-color: var(--accent3); }
    .input-group input.wrong-input { border-color: var(--danger); }

    /* ── 버튼 ── */
    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    .btn {
      flex: 1;
      padding: 13px;
      border-radius: var(--radius);
      border: none;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── 결과 메시지 ── */
    #message {
      font-size: 0.95em;
      padding: 12px 18px;
      border-radius: 10px;
      width: 100%;
      display: none;
    }
    #message.correct { background: rgba(79,247,160,.1); border: 1px solid var(--accent3); color: var(--accent3); }
    #message.wrong { background: rgba(247,97,79,.1); border: 1px solid var(--danger); color: var(--danger); }

    /* ── 크레딧 ── */
    footer {
      position: fixed;
      bottom: 10px;
      right: 14px;
      font-size: 0.8em;
      color: var(--text-sub);
    }
  </style>
</head>
<body>

<header>
  <h1>등가속도 <span>직선운동</span> 연습</h1>
  <div class="score-badge">점수: <b id="score-display">0</b></div>
</header>

<!-- 레벨 선택 화면 -->
<div id="level-screen">
  <h2>난이도를 선택하세요</h2>
  <div class="level-cards">
    <div class="level-card lv1" onclick="startLevel(1)">
      <div class="lv-num">Lv.1</div>
      <div class="lv-title">그래프 읽기</div>
      <div class="lv-desc">주어진 운동 상황에 맞는<br>v-t 그래프를 선택하세요</div>
    </div>
    <div class="level-card lv2" onclick="startLevel(2)">
      <div class="lv-num">Lv.2</div>
      <div class="lv-title">값 계산하기</div>
      <div class="lv-desc">v-t / a-t 그래프를 보고<br>속도·변위·평균속도를 구하세요</div>
    </div>
    <div class="level-card lv3" onclick="startLevel(3)">
      <div class="lv-num">Lv.3</div>
      <div class="lv-title">종합 분석</div>
      <div class="lv-desc">정지 시각·방향 전환 등<br>복합 조건을 분석하세요</div>
    </div>
  </div>
</div>

<!-- 문제 화면 -->
<div id="problem-screen">
  <div class="problem-header">
    <span id="level-tag" class="level-tag lv1-tag">Lv.1</span>
    <button class="back-btn" onclick="goToLevelSelect()">← 레벨 선택</button>
  </div>

  <div class="problem-card">
    <div class="problem-type-label" id="problem-type-label">그래프 스케치</div>
    <p class="problem-text" id="problem-text"></p>
  </div>

  <!-- 메인 그래프 캔버스 (레벨2,3용) -->
  <canvas id="main-canvas" width="560" height="280" style="display:none;"></canvas>

  <!-- 선택지 (레벨1용) -->
  <div class="choices-grid" id="choices-area" style="display:none;"></div>

  <!-- 숫자 입력 (레벨2,3용) -->
  <div class="input-grid" id="input-area" style="display:none;"></div>

  <div id="message"></div>

  <div class="btn-row">
    <button class="btn btn-primary" id="check-btn" onclick="checkAnswer()">정답 확인</button>
    <button class="btn btn-secondary" id="next-btn" onclick="nextProblem()" disabled>다음 문제 →</button>
  </div>
</div>

<footer>조준현T</footer>

<script>
// ─────────────────────────────────────────────
// 상태
// ─────────────────────────────────────────────
let level = 1;
let score = 0;
let currentProblem = {};
let answered = false;

// ─────────────────────────────────────────────
// 화면 전환
// ─────────────────────────────────────────────
function goToLevelSelect() {
  document.getElementById('level-screen').style.display = 'flex';
  document.getElementById('problem-screen').style.display = 'none';
}

function startLevel(lv) {
  level = lv;
  document.getElementById('level-screen').style.display = 'none';
  document.getElementById('problem-screen').style.display = 'flex';

  const tag = document.getElementById('level-tag');
  tag.textContent = `Lv.${lv}`;
  tag.className = `level-tag lv${lv}-tag`;

  answered = false;
  generateProblem();
}

// ─────────────────────────────────────────────
// 문제 생성 라우터
// ─────────────────────────────────────────────
function generateProblem() {
  answered = false;
  document.getElementById('check-btn').disabled = false;
  document.getElementById('next-btn').disabled = true;
  hideMessage();

  if (level === 1) generateLevel1();
  else if (level === 2) generateLevel2();
  else generateLevel3();
}

// ─────────────────────────────────────────────
// 레벨 1 : 운동 상황 → v-t 그래프 선택
// ─────────────────────────────────────────────
/*
  운동 상황 유형 pool
  type A: 양(+)방향 등가속도 (v0=0에서 출발)
  type B: 양(+)방향 등속도
  type C: 양(+)방향이다가 감속 → 정지
  type D: 음(-)방향 등가속도 (역방향 출발)
*/
function generateLevel1() {
  document.getElementById('main-canvas').style.display = 'none';
  document.getElementById('input-area').style.display = 'none';
  document.getElementById('choices-area').style.display = 'grid';
  document.getElementById('problem-type-label').textContent = '그래프 스케치 선택';

  const types = ['A','B','C','D'];
  const correctType = types[Math.floor(Math.random() * types.length)];

  const descriptions = {
    A: '물체가 정지 상태에서 출발하여 일정한 가속도로 속력이 증가하며 운동한다.',
    B: '물체가 일정한 속도로 등속 운동을 한다.',
    C: '물체가 양(+)의 초속도를 가지고 출발한 후, 일정하게 감속하여 정지한다.',
    D: '물체가 음(−)의 초속도를 가지고 출발하여 속력이 일정하게 증가한다. (반대 방향 이동)',
  };

  document.getElementById('problem-text').textContent =
    `다음 운동 상황에 해당하는 v-t 그래프를 고르시오.\n\n"${descriptions[correctType]}"`;

  // 선택지 배열: 정답 포함, 순서 섞기
  const shuffled = [...types].sort(() => Math.random() - .5);
  currentProblem = { correctType, shuffled };

  const area = document.getElementById('choices-area');
  area.innerHTML = '';
  shuffled.forEach((t, i) => {
    const btn = document.createElement('div');
    btn.className = 'choice-btn';
    btn.dataset.type = t;
    const cvs = document.createElement('canvas');
    cvs.width = 240; cvs.height = 150;
    drawChoiceGraph(cvs, t);
    btn.appendChild(cvs);
    btn.onclick = () => selectChoice(btn);
    area.appendChild(btn);
  });
}

function selectChoice(el) {
  if (answered) return;
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  currentProblem.userChoice = el.dataset.type;
}

// ─────────────────────────────────────────────
// 레벨 2 : v-t or a-t 그래프 → 값 계산
// ─────────────────────────────────────────────
function generateLevel2() {
  document.getElementById('choices-area').style.display = 'none';
  document.getElementById('main-canvas').style.display = 'block';
  document.getElementById('input-area').style.display = 'grid';
  document.getElementById('problem-type-label').textContent = '그래프 읽고 계산하기';

  // 정수 조건 만족하는 난수 생성
  let v0, a, tEnd, tQuery, vAtQuery, disp, avgV;
  do {
    v0 = Math.floor(Math.random() * 10) * 2;       // 0~18 짝수
    a  = (Math.floor(Math.random() * 5) + 1) * 2;  // 2~10 짝수
    tEnd = Math.floor(Math.random() * 3) + 4;       // 4~6 s
    tQuery = Math.floor(Math.random() * (tEnd - 1)) + 1;
    vAtQuery = v0 + a * tQuery;
    disp = v0 * tEnd + 0.5 * a * tEnd * tEnd;
    avgV = disp / tEnd;
  } while (avgV % 1 !== 0 || disp % 1 !== 0);

  currentProblem = { v0, a, tEnd, tQuery, vAtQuery, disp, avgV, graphType: 'vt' };

  document.getElementById('problem-text').innerHTML =
    `아래 <b>v-t 그래프</b>를 보고 물음에 답하시오.<br>
     (초기 속도 ${v0} m/s, 등가속도 운동)`;

  drawMainGraph();

  const inputArea = document.getElementById('input-area');
  inputArea.innerHTML = `
    <div class="input-group">
      <label>${tQuery}초 후 속도 (m/s)</label>
      <input type="number" id="inp-v" placeholder="정수 입력">
    </div>
    <div class="input-group">
      <label>${tEnd}초 동안 이동 변위 (m)</label>
      <input type="number" id="inp-d" placeholder="정수 입력">
    </div>
    <div class="input-group">
      <label>${tEnd}초 동안 평균 속도 (m/s)</label>
      <input type="number" id="inp-avg" placeholder="정수 입력">
    </div>
  `;
}

// ─────────────────────────────────────────────
// 레벨 3 : 방향 전환·정지 포함 종합 분석
// ─────────────────────────────────────────────
function generateLevel3() {
  document.getElementById('choices-area').style.display = 'none';
  document.getElementById('main-canvas').style.display = 'block';
  document.getElementById('input-area').style.display = 'grid';
  document.getElementById('problem-type-label').textContent = '종합 분석';

  // v0 > 0, a < 0 → 방향전환 발생
  let v0, a, tStop, tEnd, dispTotal, dispNet, tQuery;
  do {
    v0 = (Math.floor(Math.random() * 4) + 2) * 4;  // 8,12,16,20
    a  = -Math.floor(Math.random() * 3) - 2;         // -2,-3,-4
    tStop = -v0 / a;                                 // 정지 시각
    tEnd  = tStop + Math.floor(Math.random() * 2) + 2; // 정지 이후 추가 시간
    tQuery = Math.floor(tStop) + 1;
    dispNet = v0 * tEnd + 0.5 * a * tEnd * tEnd;
    dispTotal = (v0 * tStop + 0.5 * a * tStop * tStop) * 2 + Math.abs(dispNet - (v0*tStop + 0.5*a*tStop*tStop));
  } while (
    tStop % 1 !== 0 ||
    tEnd % 1 !== 0 ||
    dispNet % 1 !== 0
  );

  // tQuery에서의 속도
  const vQuery = v0 + a * tQuery;
  const dispUpToQuery = v0 * tQuery + 0.5 * a * tQuery * tQuery;

  currentProblem = { v0, a, tStop, tEnd, tQuery, vQuery, dispNet, dispTotal: Math.abs(v0*tStop+0.5*a*tStop*tStop)*2 + Math.abs(dispNet), graphType: 'vt3' };

  // 실제 총 이동거리
  const dForward = v0 * tStop + 0.5 * a * tStop * tStop; // 정지까지 변위
  const dNet = v0 * tEnd + 0.5 * a * tEnd * tEnd;
  currentProblem.dForward = dForward;
  currentProblem.dNet = dNet;
  currentProblem.totalDist = dForward + Math.abs(dNet - dForward);

  document.getElementById('problem-text').innerHTML =
    `아래 <b>v-t 그래프</b>를 보고 물음에 답하시오.`;

  drawMainGraph();

  const inputArea = document.getElementById('input-area');
  inputArea.innerHTML = `
    <div class="input-group">
      <label>물체가 정지하는 시각 (s)</label>
      <input type="number" id="inp-tstop" placeholder="정수 입력">
    </div>
    <div class="input-group">
      <label>${tEnd}초 후 변위 (m)</label>
      <input type="number" id="inp-dnet" placeholder="정수·부호 포함">
    </div>
    <div class="input-group">
      <label>${tEnd}초 동안 총 이동 거리 (m)</label>
      <input type="number" id="inp-dtot" placeholder="정수 입력">
    </div>
  `;
}

// ─────────────────────────────────────────────
// 정답 확인
// ─────────────────────────────────────────────
function checkAnswer() {
  if (answered) return;
  answered = true;
  document.getElementById('check-btn').disabled = true;
  document.getElementById('next-btn').disabled = false;

  let correct = false;

  if (level === 1) {
    const chosen = currentProblem.userChoice;
    if (!chosen) { answered = false; document.getElementById('check-btn').disabled = false; showMessage('wrong','선택지를 먼저 선택해주세요.'); return; }
    correct = chosen === currentProblem.correctType;
    // 시각적 피드백
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.dataset.type === currentProblem.correctType) b.classList.add('correct');
      else if (b.dataset.type === chosen && !correct) b.classList.add('wrong');
    });

  } else if (level === 2) {
    const userV   = parseInt(document.getElementById('inp-v').value);
    const userD   = parseInt(document.getElementById('inp-d').value);
    const userAvg = parseInt(document.getElementById('inp-avg').value);
    const { vAtQuery, disp, avgV } = currentProblem;
    const allOk = userV === vAtQuery && userD === disp && userAvg === avgV;
    correct = allOk;
    markInput('inp-v',   userV   === vAtQuery);
    markInput('inp-d',   userD   === disp);
    markInput('inp-avg', userAvg === avgV);
    if (!correct) showMessage('wrong',
      `오답. 정답: ${currentProblem.tQuery}초 후 속도=${vAtQuery}m/s, 변위=${disp}m, 평균속도=${avgV}m/s`);

  } else {
    const userTStop = parseInt(document.getElementById('inp-tstop').value);
    const userDNet  = parseInt(document.getElementById('inp-dnet').value);
    const userDTot  = parseInt(document.getElementById('inp-dtot').value);
    const { tStop, dNet, totalDist } = currentProblem;
    const allOk = userTStop === tStop && userDNet === Math.round(dNet) && userDTot === Math.round(totalDist);
    correct = allOk;
    markInput('inp-tstop', userTStop === tStop);
    markInput('inp-dnet',  userDNet  === Math.round(dNet));
    markInput('inp-dtot',  userDTot  === Math.round(totalDist));
    if (!correct) showMessage('wrong',
      `오답. 정답: 정지시각=${tStop}s, 변위=${Math.round(dNet)}m, 총이동거리=${Math.round(totalDist)}m`);
  }

  if (correct) {
    score += 2;
    document.getElementById('score-display').textContent = score;
    showMessage('correct', '정답입니다! +2점');
  } else {
    score = Math.max(0, score - 1);
    document.getElementById('score-display').textContent = score;
  }
}

function markInput(id, ok) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add(ok ? 'correct-input' : 'wrong-input');
}

function nextProblem() {
  // 입력 스타일 초기화
  document.querySelectorAll('input').forEach(el => {
    el.classList.remove('correct-input','wrong-input');
    el.value = '';
  });
  generateProblem();
}

// ─────────────────────────────────────────────
// 캔버스 그리기 유틸
// ─────────────────────────────────────────────
const COLORS = {
  axis: '#8b8fa8',
  grid: '#2e3347',
  line: '#4f8ef7',
  fill: 'rgba(79,142,247,0.12)',
  label: '#e8eaf2',
  tick:  '#8b8fa8',
  zero:  '#f7614f',
};

function setupAxes(ctx, W, H, px, py, xLabel, yLabel) {
  ctx.strokeStyle = COLORS.axis;
  ctx.lineWidth = 1.5;
  // y축
  ctx.beginPath(); ctx.moveTo(px, 10); ctx.lineTo(px, H - py + 10); ctx.stroke();
  // x축
  ctx.beginPath(); ctx.moveTo(px - 10, H - py); ctx.lineTo(W - 10, H - py); ctx.stroke();
  // 화살표
  ctx.fillStyle = COLORS.axis;
  arrow(ctx, px, 10, 'up');
  arrow(ctx, W - 10, H - py, 'right');
  // 축 레이블
  ctx.font = '12px JetBrains Mono, monospace';
  ctx.fillStyle = COLORS.tick;
  ctx.fillText(xLabel, W - 8, H - py + 14);
  ctx.fillText(yLabel, px + 6, 14);
}

function arrow(ctx, x, y, dir) {
  ctx.beginPath();
  if (dir === 'up')    { ctx.moveTo(x-5,y+8);  ctx.lineTo(x,y);  ctx.lineTo(x+5,y+8); }
  if (dir === 'right') { ctx.moveTo(x-8,y-5);  ctx.lineTo(x,y);  ctx.lineTo(x-8,y+5); }
  ctx.stroke();
}

// 선택지 그래프 (소형)
function drawChoiceGraph(cvs, type) {
  const ctx = cvs.getContext('2d');
  const W = cvs.width, H = cvs.height;
  ctx.clearRect(0, 0, W, H);

  const px = 36, py = 24;
  const gW = W - px - 16, gH = H - py - 24;

  // 배경
  ctx.fillStyle = '#1a1d27';
  ctx.fillRect(0, 0, W, H);

  setupAxes(ctx, W, H, px, py, 't', 'v');

  // 유형별 그래프 선
  ctx.strokeStyle = COLORS.line;
  ctx.lineWidth = 2;
  ctx.beginPath();

  const x0 = px, x1 = W - 16;
  const y0 = H - py;   // v=0 선
  const ymid = H - py - gH / 2;
  const ytop = H - py - gH + 10;
  const ybot = H - py + 0;

  if (type === 'A') {
    // v0=0, 양가속도
    ctx.moveTo(x0, y0); ctx.lineTo(x1, ytop);
  } else if (type === 'B') {
    // 등속 (수평)
    ctx.moveTo(x0, ymid); ctx.lineTo(x1, ymid);
  } else if (type === 'C') {
    // 감속 → 정지
    const xStop = x0 + gW * 0.6;
    ctx.moveTo(x0, ymid); ctx.lineTo(xStop, y0); ctx.lineTo(xStop, y0);
    // 이후 수평 (정지)
    ctx.moveTo(xStop, y0); ctx.lineTo(x1, y0);
  } else if (type === 'D') {
    // 음의 초속도, 음가속도 (더 빠르게 음으로)
    ctx.moveTo(x0, ymid); ctx.lineTo(x1, H - 14);
  }
  ctx.stroke();

  // 그래프 유형 라벨
  ctx.fillStyle = COLORS.tick;
  ctx.font = '11px Noto Sans KR, sans-serif';
  ctx.fillText(['A','B','C','D'].includes(type) ? `선택지` : '', 4, 12);
}

// 메인 그래프 (레벨2, 3)
function drawMainGraph() {
  const cvs = document.getElementById('main-canvas');
  const ctx = cvs.getContext('2d');
  const W = cvs.width, H = cvs.height;
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = '#1a1d27';
  ctx.fillRect(0, 0, W, H);

  const px = 52, py = 30;
  const gW = W - px - 20, gH = H - py - 36;

  const { v0, a, tEnd } = currentProblem;

  if (currentProblem.graphType === 'vt' || currentProblem.graphType === 'vt3') {
    const vMax = v0 + Math.abs(a) * (tEnd + 1);
    const vMin = currentProblem.graphType === 'vt3'
      ? (v0 + a * (tEnd + 1))
      : 0;
    const vRange = Math.max(vMax, Math.abs(vMin)) + 2;

    // 눈금 및 그리드
    ctx.strokeStyle = COLORS.grid;
    ctx.lineWidth = 0.7;
    for (let t = 0; t <= tEnd + 1; t++) {
      const x = px + (t / (tEnd + 1)) * gW;
      ctx.beginPath(); ctx.moveTo(x, py - 10); ctx.lineTo(x, H - py + 6); ctx.stroke();
      ctx.fillStyle = COLORS.tick;
      ctx.font = '11px JetBrains Mono, monospace';
      if (t > 0) ctx.fillText(t, x - 4, H - py + 18);
    }

    // v=0 기준선
    const yZero = (currentProblem.graphType === 'vt3')
      ? py + (vRange / (2 * vRange)) * gH  // 중간
      : H - py;

    // v-t 직선
    const x0 = px;
    const x1 = px + (tEnd / (tEnd + 1)) * gW;
    const toY = (v) => {
      if (currentProblem.graphType === 'vt') return H - py - (v / vRange) * gH;
      return H - py - ((v + vRange) / (2 * vRange)) * gH;
    };

    // 채우기
    ctx.fillStyle = COLORS.fill;
    ctx.beginPath();
    ctx.moveTo(x0, toY(v0));
    ctx.lineTo(x1, toY(v0 + a * tEnd));
    ctx.lineTo(x1, toY(0));
    ctx.lineTo(x0, toY(0));
    ctx.closePath();
    ctx.fill();

    // 선
    ctx.strokeStyle = COLORS.line;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(x0, toY(v0));
    ctx.lineTo(x1, toY(v0 + a * tEnd));
    ctx.stroke();

    // v=0 빨간 기준선 (레벨3)
    if (currentProblem.graphType === 'vt3') {
      ctx.strokeStyle = COLORS.zero;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(px - 6, toY(0));
      ctx.lineTo(W - 20, toY(0));
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = COLORS.zero;
      ctx.font = '11px JetBrains Mono, monospace';
      ctx.fillText('0', px - 14, toY(0) + 4);
    }

    // 축
    setupAxes(ctx, W, H, px, py, 't(s)', 'v(m/s)');

    // v0 표시
    ctx.fillStyle = COLORS.label;
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.fillText(v0, px - 22, toY(v0) + 4);
    ctx.fillText(tEnd, x1 - 4, H - py + 18);
  }
}

// 메시지
function showMessage(type, text) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = type;
  el.style.display = 'block';
}
function hideMessage() {
  const el = document.getElementById('message');
  el.style.display = 'none';
  el.className = '';
}
